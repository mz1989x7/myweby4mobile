name: Sync JSON from external URL

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create folder
        run: mkdir -p upload

      - name: Download JSON
        run: |
          curl -L \
            -A "Mozilla/5.0" \
            "https://myweby4mobile.is-best.net/upload/myweby4mobile.json?i=1" \
            -o upload/myweby4mobile.json

          cat upload/myweby4mobile.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add upload/myweby4mobile.json

          git diff --cached --quiet || git commit -m "Auto sync JSON"

          git push origin HEAD
